<body class="bg-amber-500">

  Calculator

<div class="border-2 bg-black  ">
            <div class="flex justify-center w-auto">

                   <button class=" border-2 p-3 bg-black text-white   lg:p-6 hover:bg-violet-600 active:bg-red-500" onclick="abc(this)">6</button>

<button class="border-2 p-3 bg-black text-white  lg:p-6 hover:bg-violet-600 active:bg-red-500" onclick="operators(this)">*</button>
<button class="border-2 p-3 bg-black text-white  lg:p-6 hover:bg-violet-600 active:bg-red-500" onclick="operators(this)">-</button>
</div>
<div class=" flex justify-center gap-3 lg:gap-6 flex-wrap-reverse">
    <button class="border-2 p-3 bg-black text-white lg:p-6 hover:bg-violet-600 active:bg-red-500" onclick="abc(this)">3</button>

<button class="border-2 p-3 bg-black text-white lg:p-6 hover:bg-violet-600 active:bg-red-500" onclick="abc(this)">6</button>

<button class="border-2 p-3 bg-black text-white lg:p-6 hover:bg-violet-600 active:bg-red-500" onclick="operators(this)">+</button>
</div>
<div class=" flex justify-center gap-3 lg:gap-6 flex-wrap-reverse">
        <button class=" border-2 p-3 bg-black text-white lg:p-6 hover:bg-violet-600 active:bg-red-500" onclick="abc(this)">0</button>
